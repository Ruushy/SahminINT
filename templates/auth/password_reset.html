{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-key auth-icon"></i>
      <h1>Reset <span class="accent">Password</span></h1>
    </div>
    <form method="POST" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" name="email" id="id_email" class="form-input" required placeholder="Your registered email">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <div class="auth-links">
      <a href="{% url 'users:login' %}" class="auth-link">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
