{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-check-circle auth-icon" style="color:var(--success);"></i>
      <h1>Check Your <span class="accent">Email</span></h1>
    </div>
    <p class="text-muted" style="text-align:center;">If an account with that email exists, we've sent a password reset link.</p>
    <div class="auth-links">
      <a href="{% url 'users:login' %}" class="auth-link">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
