{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-lock auth-icon"></i>
      <h1>Set New <span class="accent">Password</span></h1>
    </div>
    <form method="POST" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_new_password1">New Password</label>
        <input type="password" name="new_password1" id="id_new_password1" class="form-input" required>
      </div>
      <div class="form-group">
        <label for="id_new_password2">Confirm Password</label>
        <input type="password" name="new_password2" id="id_new_password2" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}
