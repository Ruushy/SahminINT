{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-check-circle auth-icon" style="color:var(--success);"></i>
      <h1>Password <span class="accent">Reset</span></h1>
    </div>
    <p class="text-muted" style="text-align:center;">Your password has been set. You can now sign in.</p>
    <div class="auth-links">
      <a href="{% url 'users:login' %}" class="btn btn-primary btn-block">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
