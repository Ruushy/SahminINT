{% extends "base.html" %}
{% block title %}{% if target %}Edit{% else %}Add{% endif %} Target{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="fas fa-crosshairs"></i> {% if target %}Edit{% else %}Add{% endif %} Target</h1>
</div>
<div class="panel">
  <div class="panel-body">
    <form method="POST" action="{% if target %}{% url 'targets:update' target.pk %}{% else %}{% url 'targets:create' %}{% endif %}" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id-domain">Domain</label>
        <input type="text" name="domain" id="id-domain" class="form-input" value="{{ target.domain|default:'' }}" required placeholder="e.g. example.com" autofocus>
      </div>
      <div class="form-group">
        <label for="id-notes">Notes</label>
        <textarea name="notes" id="id-notes" class="form-input" rows="3" placeholder="Optional notes...">{{ target.notes|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label for="id-tags">Tags (comma-separated)</label>
        <input type="text" name="tags" id="id-tags" class="form-input" placeholder="e.g. bugbounty, critical, recon"
               value="{% if target %}{{ target.tags.all|join:', ' }}{% endif %}">
      </div>
      <button type="submit" class="btn btn-primary">
        {% if target %}<i class="fas fa-save"></i> Update{% else %}<i class="fas fa-plus"></i> Add Target{% endif %}
      </button>
      <a href="{% url 'targets:list' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
